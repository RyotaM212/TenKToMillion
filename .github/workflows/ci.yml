name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trading-bot/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: trading-bot/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python
        run: python -m compileall app tests scripts

      - name: Run backend tests
        run: python -m unittest discover -s tests

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trading-bot/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: trading-bot/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare compose env file
        run: cp trading-bot/backend/.env.example trading-bot/backend/.env

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Build backend image
        run: docker compose build backend

      - name: Build frontend image
        run: docker compose build frontend

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for committed secrets
        run: |
          ! git grep -n -E '(^|[^A-Za-z0-9_])sk-[A-Za-z0-9_-]{20,}|xnYh__|OPENAI_API_KEY=[A-Za-z0-9_-]{20,}|JQUANTS_API_KEY=[A-Za-z0-9_-]{20,}' -- . ':(exclude).github/workflows/ci.yml' ':(exclude)trading-bot/backend/.env'

      - name: Check whitespace
        run: git diff --check HEAD
