services:
  backend:
    build:
      context: ./trading-bot/backend
    env_file:
      - ./trading-bot/backend/.env
    environment:
      APP_ENV: docker
      DATABASE_PATH: /data/tenk_to_million.db
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      SCHEDULER_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - tenk_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3))"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./trading-bot/frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tenk_data:
